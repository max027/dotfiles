[font]
normal = {family = "JetBrainsMono NL Nerd Font", style = "Regular"}
bold = {family = "JetBrainsMono NL Nerd Font", style = "Bold"}
italic = {family = "JetBrainsMono NL Nerd Font", style = "Italic"}
bold_italic = {family = "JetBrainsMono NL Nerd Font", style = "Bold Italic"}
size = 14.0

[window]
opacity = 0.9
startup_mode = "Maximized"

[general]
import = ["~/.config/alacritty/catppuccin-macchiato.toml"]

[terminal]
shell = {program = "/bin/bash", args = ["-c", "fastfetch; exec bash"]}
